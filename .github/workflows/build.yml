name: Build HyperHelper

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
          fetch-depth: 0

    - name: Checkout submodules
      run: git submodule update --init --recursive

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Decode android signing key
      run: echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks

    - name: Build release apk
      run: ./gradlew assembleRelease
      env:
        KEYSTORE_PATH: "../keystore.jks"
        KEYSTORE_PWD: ${{ secrets.KEYSTORE_PWD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PWD: ${{ secrets.KEY_PWD }}

    - name: Rename artifact
      run: mv app/build/outputs/apk/release/*.apk app/build/outputs/apk/release/HyperHelper-release.apk

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        path: app/build/outputs/apk/release/HyperHelper-release.apk
        archive: false
